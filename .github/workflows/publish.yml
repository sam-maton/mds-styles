name: Publish to npm

on:
  push:
    branches:
      - main

jobs:
  publish:
    name: Publish @smaton/mds-styles
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Verify npm authentication
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm ping
          npm whoami

      - name: Verify package scope in manifest
        run: |
          PKG_NAME=$(npm pkg get name | tr -d '"')
          if [[ "$PKG_NAME" != @smaton/* ]]; then
            echo "Expected package scope @smaton, got $PKG_NAME"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
